services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: ha-mvp-homeassistant
    restart: unless-stopped
    ports:
      - "${HOMEASSISTANT_PORT:-8123}:8123"
    volumes:
      - ./ha:/config
    environment:
      - TZ=UTC

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ha-mvp-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - HA_URL=${HA_URL:-http://homeassistant:8123}
      - HA_TOKEN=${HA_TOKEN:-}
      - VOICE_BRIDGE_ENABLED=${VOICE_BRIDGE_ENABLED:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b}
      - OLLAMA_NLU_ENABLED=${OLLAMA_NLU_ENABLED:-true}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-15}
    depends_on:
      - homeassistant
      - ollama
    entrypoint: []
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  ollama:
    image: ollama/ollama:latest
    container_name: ha-mvp-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=-1

    deploy:
      resources:
         reservations:
           devices:
             - driver: nvidia
               count: 1
               capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  ui:
    image: node:20-bookworm-slim
    container_name: ha-mvp-ui
    working_dir: /app
    ports:
      - "${UI_PORT:-5173}:5173"
    environment:
      - VITE_PROXY_TARGET=${VITE_PROXY_TARGET:-http://backend:8000}
    volumes:
      - ./ui:/app
      - ui_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend

volumes:
  ui_node_modules:
  ollama_models:      # модели хранятся между перезапусками
