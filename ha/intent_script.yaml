# Thin wiring: custom_sentences/ru → intent_script. Управление и сцены: один вызов сервиса + короткий speech.
# Статус-интенты (mvp_status_*): без чтения состояний в HA — только нейтральный speech + delay; интерпретация в FastAPI (P4b).

mvp_lr_main_on:
  speech:
    text: "Включаю основной свет в гостиной"
  action:
    - service: light.turn_on
      target:
        entity_id: light.living_room_main

mvp_lr_main_off:
  speech:
    text: "Выключаю основной свет в гостиной"
  action:
    - service: light.turn_off
      target:
        entity_id: light.living_room_main

